steps:
- name: gcr.io/cloud-builders/docker
  args:
  - build
  - -t
  - asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/slimweb-client-mcp:$COMMIT_SHA
  - .
- name: gcr.io/cloud-builders/docker
  args:
  - push
  - asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/slimweb-client-mcp:$COMMIT_SHA
- name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
  entrypoint: gcloud
  args:
  - run
  - deploy
  - slimweb-client-mcp
  - --image
  - asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/slimweb-client-mcp:$COMMIT_SHA
  - --region
  - asia-east1
  - --platform
  - managed
  - --allow-unauthenticated
images:
- asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/slimweb-client-mcp:$COMMIT_SHA
